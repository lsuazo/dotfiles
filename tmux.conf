# tmux doesn't load .zshrc -- makes it a login shell
# set -g default-command /bin/zsh

# set mouse resize and select pane. Also select window, and something called mode-mouse
set -g mouse on

# set vi keys when in copy mode
set -g mode-keys vi

# switch prefix
unbind-key C-b
set-option -g prefix C-z
bind-key C-z send-prefix

# navigate panes with hjkl
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# resize with Ctrl + hjkl
bind -r -T prefix C-k resize-pane -U 5
bind -r -T prefix C-j resize-pane -D 5
bind -r -T prefix C-h resize-pane -L 5
bind -r -T prefix C-l resize-pane -R 5


# highlight active pane
set -g pane-border-style fg=colour240
set -g pane-active-border-style fg=yellow
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[bold fg=black bg=yelow] ACTIVE #[default],#[fg=colour244] #{pane_index} }"

# show tmux windows as tabs ins status bar
set -g status on
set -g status-position bottom
set -g status-style bg=colour234,fg=colour250
set -g window-status-format " #I:#W "
set -g window-status-current-format " #[bold fg=black bg=yellow] #I:#W #[default] "
